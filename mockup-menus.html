<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Menu4U - Menu Grid Management OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-card: rgba(255, 255, 255, 0.07);
            --glass-card-hover: rgba(255, 255, 255, 0.14);
            --glass-border: rgba(255, 255, 255, 0.15);
            
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.6);
            
            --accent: #D97706; /* אמבר/כתום של המותג */
            --accent-gradient: linear-gradient(135deg, #D97706, #F59E0B);
            --color-red: #EF4444;
        }

        body {
            margin: 0;
            padding: 25px;
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(rgba(15, 15, 20, 0.75), rgba(15, 15, 20, 0.75)), 
                        url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=2070') no-repeat center center/cover fixed;
            color: var(--text-main);
            min-height: 100vh;
            box-sizing: border-box;
        }

        .layout-container {
            max-width: 1500px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .layout-container { grid-template-columns: 1fr; }
        }

        /* סרגל פעולות עליון */
        .action-header {
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 { margin: 0; font-size: 24px; font-weight: 900; }
        .header-title span { color: var(--text-muted); font-size: 13px; }

        .btn-group { display: flex; gap: 10px; }
        
        .btn-base {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-family: 'Heebo';
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-base:hover { background: rgba(255,255,255,0.12); }
        
        .btn-add-cat {
            background: var(--accent-gradient);
            border: none;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3);
        }
        .btn-add-cat:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(217, 119, 6, 0.4); }

        /* גריד קוביות מרכזי (Grid View) */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            align-content: flex-start;
        }

        /* עיצוב קוביה בודדת (Grid Card) */
        .category-box {
            background: var(--glass-card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 22px;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .category-box:hover {
            transform: translateY(-5px);
            background: var(--glass-card-hover);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .box-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .box-title-area {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .category-name { font-size: 18px; font-weight: 700; color: white; }
        
        .items-count {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .drag-dot {
            color: var(--text-muted);
            cursor: grab;
            opacity: 0.4;
            transition: 0.2s;
        }
        .category-box:hover .drag-dot { opacity: 1; }

        .badge-kitchen {
            align-self: flex-start;
            background: rgba(245, 158, 11, 0.15);
            color: #FBBF24;
            border: 1px solid rgba(245, 158, 11, 0.3);
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 5px;
        }

        /* שורת כפתורי פעולה בתחתית הקוביה */
        .box-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 12px;
        }

        .action-icon-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .action-icon-btn:hover { background: rgba(255,255,255,0.15); }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.2); border-color: var(--color-red); color: #FCA5A5; }

        /* סיידבר ימני */
        .sidebar-right {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 20px;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .restaurant-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
        
        .restaurant-item {
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-muted);
            transition: 0.2s;
        }
        .restaurant-item:hover { background: rgba(255,255,255,0.05); color: white; }
        
        .restaurant-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
            font-weight: 700;
            box-shadow: inset 0 0 0 1px var(--glass-border);
        }

        .btn-add-sub {
            width: 100%;
            margin-top: 10px;
            justify-content: center;
            background: none;
            border: 1px dashed var(--glass-border);
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="layout-container">
        
        <header class="action-header">
            <div class="header-title">
                <h1>ניהול תפריטים <span>(תצוגת קוביות)</span></h1>
                <span>מסעדה איטלקית · תפריט ראשי</span>
            </div>
            <div class="btn-group">
                <button class="btn-base"><i data-lucide="file-text" size="14"></i> קובץ דוגמה</button>
                <button class="btn-base"><i data-lucide="sparkles" size="14" style="color: #F59E0B"></i> אלרגנים אוטו'</button>
                <button class="btn-base"><i data-lucide="download" size="14"></i> יבוא</button>
                <button class="btn-base"><i data-lucide="upload" size="14"></i> ייצוא</button>
                <button class="btn-base btn-add-cat"><i data-lucide="plus" size="14"></i> קטגוריה חדשה</button>
            </div>
        </header>

        <main class="main-grid">
            
            <div class="category-box">
                <div class="box-top">
                    <div class="box-title-area">
                        <span class="category-name">מנות ראשונות</span>
                        <div class="items-count"><i data-lucide="layers" size="13"></i> 8 פריטים</div>
                    </div>
                    <i data-lucide="grip-vertical" class="drag-dot" size="16"></i>
                </div>
                <div class="box-actions">
                    <button class="action-icon-btn" title="הוסף פריט לקטגוריה"><i data-lucide="plus" size="14"></i></button>
                    <button class="action-icon-btn" title="ערוך קטגוריה"><i data-lucide="edit-3" size="14"></i></button>
                    <button class="action-icon-btn btn-delete" title="מחק קטגוריה"><i data-lucide="trash-2" size="14"></i></button>
                </div>
            </div>

            <div class="category-box">
                <div class="box-top">
                    <div class="box-title-area">
                        <span class="category-name">מנות עיקריות</span>
                        <div class="items-count"><i data-lucide="layers" size="13"></i> 16 פריטים</div>
                    </div>
                    <i data-lucide="grip-vertical" class="drag-dot" size="16"></i>
                </div>
                <div class="box-actions">
                    <button class="action-icon-btn"><i data-lucide="plus" size="14"></i></button>
                    <button class="action-icon-btn"><i data-lucide="edit-3" size="14"></i></button>
                    <button class="action-icon-btn btn-delete"><i data-lucide="trash-2" size="14"></i></button>
                </div>
            </div>

            <div class="category-box">
                <div class="box-top">
                    <div class="box-title-area">
                        <span class="category-name">קינוחים</span>
                        <div class="items-count"><i data-lucide="layers" size="13"></i> 8 פריטים</div>
                    </div>
                    <i data-lucide="grip-vertical" class="drag-dot" size="16"></i>
                </div>
                <div class="box-actions">
                    <button class="action-icon-btn"><i data-lucide="plus" size="14"></i></button>
                    <button class="action-icon-btn"><i data-lucide="edit-3" size="14"></i></button>
                    <button class="action-icon-btn btn-delete"><i data-lucide="trash-2" size="14"></i></button>
                </div>
            </div>

            <div class="category-box">
                <div class="box-top">
                    <div class="box-title-area">
                        <span class="category-name">משקאות חמים</span>
                        <div class="items-count"><i data-lucide="layers" size="13"></i> 7 פריטים</div>
                        <span class="badge-kitchen">ללא מטבח</span>
                    </div>
                    <i data-lucide="grip-vertical" class="drag-dot" size="16"></i>
                </div>
                <div class="box-actions">
                    <button class="action-icon-btn"><i data-lucide="plus" size="14"></i></button>
                    <button class="action-icon-btn"><i data-lucide="edit-3" size="14"></i></button>
                    <button class="action-icon-btn btn-delete"><i data-lucide="trash-2" size="14"></i></button>
                </div>
            </div>

            <div class="category-box">
                <div class="box-top">
                    <div class="box-title-area">
                        <span class="category-name">יינות</span>
                        <div class="items-count"><i data-lucide="layers" size="13"></i> 4 פריטים</div>
                        <span class="badge-kitchen">ללא מטבח</span>
                    </div>
                    <i data-lucide="grip-vertical" class="drag-dot" size="16"></i>
                </div>
                <div class="box-actions">
                    <button class="action-icon-btn"><i data-lucide="plus" size="14"></i></button>
                    <button class="action-icon-btn"><i data-lucide="edit-3" size="14"></i></button>
                    <button class="action-icon-btn btn-delete"><i data-lucide="trash-2" size="14"></i></button>
                </div>
            </div>

            <div class="category-box">
                <div class="box-top">
                    <div class="box-title-area">
                        <span class="category-name">משקאות קרים</span>
                        <div class="items-count"><i data-lucide="layers" size="13"></i> 6 פריטים</div>
                        <span class="badge-kitchen">ללא מטבח</span>
                    </div>
                    <i data-lucide="grip-vertical" class="drag-dot" size="16"></i>
                </div>
                <div class="box-actions">
                    <button class="action-icon-btn"><i data-lucide="plus" size="14"></i></button>
                    <button class="action-icon-btn"><i data-lucide="edit-3" size="14"></i></button>
                    <button class="action-icon-btn btn-delete"><i data-lucide="trash-2" size="14"></i></button>
                </div>
            </div>

        </main>

        <aside class="sidebar-right">
            <div class="glass-panel">
                <div class="panel-title"><i data-lucide="store" size="14"></i> מסעדות פתוחות</div>
                <ul class="restaurant-list">
                    <li class="restaurant-item active">מסעדה איטלקית</li>
                    <li class="restaurant-item">מסעדה מזרחית</li>
                    <li class="restaurant-item">מסעדה סינית</li>
                </ul>
            </div>
            <div class="glass-panel">
                <div class="panel-title"><i data-lucide="book-open" size="14"></i> סוג תפריט</div>
                <ul class="restaurant-list">
                    <li class="restaurant-item active">תפריט ראשי</li>
                </ul>
                <button class="btn-base btn-add-sub"><i data-lucide="plus" size="13"></i> תפריט חדש</button>
            </div>
        </aside>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
